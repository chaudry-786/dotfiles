# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# enable mouse
set -g mouse on
# FocusGained in neovim works because of this
set -g focus-events on

# true colour support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-option -sg escape-time 10

# increase message display time
set-option -g display-time 1000

# move like vim and copy in scroll mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

# -----------------------------------------------------------------------------
# Key Mappings
# -----------------------------------------------------------------------------

# remap prefix from 'c-b' to 'c-f'
unbind-key C-b
set -g prefix C-f
bind-key C-f send-prefix

# sane split command
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane switching like vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane like vi
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# move to start and end of line in copy mode
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line

# reload tmux config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# swap panes easily
bind > swap-pane -D       # Swap current pane with the next one
bind < swap-pane -U       # Swap current pane with the previous one

# key to run a shell command
bind-key i run-shell "tmux neww ~/dotfiles/scripts/chtfzf.sh -t"

# smart pane switching with awareness of vim and fzf
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

# key bindings for smart pane switching
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j run "($is_vim && tmux send-keys C-j)  || ($is_fzf && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || ($is_fzf && tmux send-keys C-k) || tmux select-pane -U"
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# -----------------------------------------------------------------------------
# Display Settings
# -----------------------------------------------------------------------------

# start numbering for pane and window at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on    # Renumber windows when a window is closed

# window renaming: use current directory basename
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# set inactive/active window styles
set -g window-style 'bg=colour236'
set -g window-active-style 'bg=colour234'

# change status line color when in copy mode
set-hook -g pane-mode-changed 'if -F "#{m/r:(copy|view)-mode,#{pane_mode}}" "set status-style bg=colour214" "set -u status-style"'

# set the pane border colors
set -g pane-border-style 'fg=colour235,bg=colour238'

# update status line every 1 second
set -g status-interval 1

# -----------------------------------------------------------------------------
# Theme Settings
# -----------------------------------------------------------------------------

# color scheme: gruvbox dark (medium)
# https://github.com/egel/tmux-gruvbox
set-option -g status "on"

# default statusbar color
set-option -g status-style bg=colour237,fg=colour214 # bg=bg1, fg=fg1

# default window title colors
set-window-option -g window-status-style bg=colour214,fg=colour237 # bg=yellow, fg=bg1

# default window with an activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3

# active window title colors
set-window-option -g window-status-current-style bg=red,fg=colour237 # fg=bg1

# message infos
set-option -g message-style bg=colour239,fg=colour223 # bg=bg2, fg=fg1

# writing commands inactive
set-option -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# pane number display
set-option -g display-panes-active-colour colour250 # fg2
set-option -g display-panes-colour colour237 # bg1

# clock
set-window-option -g clock-mode-colour colour109 # blue

# bell
set-window-option -g window-status-bell-style bg=colour167,fg=colour235 # bg=red, fg=bg

# theme settings mixed with colors
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[bg=colour241,fg=colour248] #S #[bg=colour237,fg=colour241,nobold,noitalics,nounderscore]"
set-option -g status-right "#{?client_prefix,#[reverse]<Prefix>#[noreverse],}#[bg=colour237,fg=colour239 nobold, nounderscore, noitalics]#[bg=colour239,fg=colour246] #{cpu_fg_color}  #{cpu_percentage} #[bg=colour239,fg=colour246] #{gpu_fg_color} #{gpu_percentage} #[bg=colour239,fg=colour248,nobold,noitalics,nounderscore]#[bg=colour248,fg=colour237]  %Y-%m-%d  %H:%M "

set-window-option -g window-status-current-format "#[bg=colour223,fg=colour237,nobold,noitalics,nounderscore]#[bg=colour223,fg=colour239] #I #[bg=colour223,fg=colour239,bold] #W#{?window_zoomed_flag,*Z,} #[bg=colour237,fg=colour223,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[bg=colour239,fg=colour237,noitalics]#[bg=colour239,fg=colour223] #I #[bg=colour239,fg=colour223] #W #[bg=colour237,fg=colour239,noitalics]"

# -----------------------------------------------------------------------------
# Plugin Settings
# -----------------------------------------------------------------------------

# Plugins
set -g @plugin 'tmux-plugins/tpm'                   # Plugin manager
set -g @plugin 'tmux-plugins/tmux-cpu'              # GPU and CPU usage in status bar
set -g @plugin 'tmux-plugins/tmux-yank'             # Yank to system clipboard

# use <c-i> to install and <c-u> to uninstall plugins
run '~/.tmux/plugins/tpm/tpm'

