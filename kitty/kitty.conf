# to debug what fonts kitty is using: kitty  --debug-font-fallback
font_family      JetBrainsMonoNL Nerd Font
symbol_map U+E000-U+FFFF JetBrainsMonoNL Nerd Font
font_size 14
cursor_beam_thickness 3
cursor_stop_blinking_after 30.0
adjust_line_height 95%
placement_strategy top-left
hide_window_decorations yes
mouse_hide_wait 1.0

# Ensure shift-enter and ctr-enter send the right codes
map shift+enter send_text all \x1b[13;2u
map ctrl+enter send_text all \x1b[13;5u

/* gruvbox hard */
url_color               #83a598

visual_bell_color       #8ec07c
bell_border_color       #8ec07c

active_border_color     #d3869b
inactive_border_color   #665c54

background              #1c1c1c
foreground              #fbf1c7
selection_foreground    #928374
selection_background    #ebdbb2

active_tab_foreground   #fbf1c7
active_tab_background   #665c54
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

